<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación Asíncrona de Información</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="contenedor">
    <h1>Consulta Asíncrona de Productos</h1>
    <p>Haz clic en el botón para cargar la información desde el servidor sin recargar la página.</p>

    <button id="btnCargar">Cargar productos</button>

    <div class="buscador-wrapper" id="buscadorWrapper" style="display: none;">
      <span class="icono-buscar">🔎</span>
      <input type="text" id="inputBuscar" placeholder="Buscar producto por nombre..." />
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div id="spinner" class="spinner" style="display: none;">
      <div class="spinner-circulo"></div>
      <p>Cargando productos...</p>
    </div>

    <section id="listaProductos" class="grid-productos"></section>
  </main>

  <script src="app.js"></script>
</body>

</html>
